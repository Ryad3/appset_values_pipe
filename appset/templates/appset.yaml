apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appset-tools
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/Ryad3/appset_values_pipe
      revision: main
      files:
      - path: "config/*.yaml"  # ← Votre chemin correct
  template:
    metadata:
      name: {{ `'{{name}}'` }}
    spec:
      project: default
      source:
        repoURL: https://github.com/Ryad3/appset_values_pipe
        path: {{ `'Tools/charts/{{helm_chart}}'` }}  # ← Sans le point
        helm:
          valueFiles:
          - values.yaml
          valuesObject: {{ `{{toYaml .values}}` }}
      destination:
        server: "https://kubernetes.default.svc"
        namespace: {{ `'{{namespace}}'` }}  # ← Sans le point
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - Validate=false
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
